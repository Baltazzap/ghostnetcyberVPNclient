name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    env:
      IS_GITHUB_ACTIONS: "1"
      SENTRY_DSN: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358" "cmake;3.22.1"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Prepare Android core and generated files
        env:
          CHANNEL: prod
        run: |
          dart pub global activate fastforge
          make android-apk-prepare

      - name: Build release APK
        env:
          CHANNEL: prod
        run: |
          flutter build apk --release \
            --target lib/main.dart \
            --target-platform android-arm,android-arm64,android-x64 \
            --build-dart-define=sentry_dsn=

      - name: List APK files
        run: |
          find build/app/outputs -name "*.apk" -type f -print -exec ls -lh {} \;

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostNet-Android-APK
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/apk/release/*.apk
          if-no-files-found: error
